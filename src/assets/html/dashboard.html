<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <link rel="stylesheet" href="dashboard.css" />
    <link rel="stylesheet" href="bootstrap.min.css" />
  </head>

  <body>
    <div class="container">
      <div class="row">
    <div class="options col-md-10" id="option-boxes">
      <!-- Version -->
      <span id="abf-version" class="abf-version"></span>

      <div>
        <input type="checkbox" id="abf-enabled" option="abf-enabled" />
        <label for="abf-enabled" id="abf-enabled-text"></label>
      </div>
      <div class="indent">
        <input type="radio" id="abf-filter-hide" />
        <label for="abf-filter-hide" id="abf-filter-hide-text"></label>

        <input type="radio" id="abf-filter-color" />
        <label for="abf-filter-color"  id="abf-filter-color-text"></label>
      </div>
      <div>
        <input type="checkbox" id="abf-filter-refiner" option="abf-filter-refiner" />
        <label for="abf-filter-refiner" id="abf-filter-refiner-text"></label>
      </div>

      <div class="indent">
        <input type="radio" id="abf-filter-refiner-hide" />
        <label for="abf-filter-refiner-hide" id="abf-filter-refiner-hide-text"></label>
        <input type="radio" id="abf-filter-refiner-grey" />
        <label for="abf-filter-refiner-grey"  id="abf-filter-refiner-grey-text"></label>
      </div>

      <div>
        <input type="checkbox" id="abf-allow-refine-bypass" option="abf-allow-refine-bypass" />
        <label for="abf-allow-refine-bypass" id="abf-allow-refine-bypass-text"></label>
      </div>

      <div>
        <input type="checkbox" id="abf-debug-mode" option="abf-debug-mode" />
        <label for="abf-debug-mode" id="abf-debug-mode-text"></label>
      </div>      
      
      <div>
        <input type="checkbox" id="abf-personal-block-enabled" option="abf-personal-block-enabled" />
        <label for="abf-personal-block-enabled" id="abf-personal-block-enabled-text"></label>
        <span><input type="button" id="abf-personal-block-button" class="abf-personal-block-button btn btn-primary"/></span>
        <span id="abf-personal-block-saved-confirm" class="abf-personal-block-saved-confirm"></span>
      </div>
      <div class="indent spaced">
        <textarea id="abf-personal-block-textbox" class="form-control" cols="45"></textarea>
      </div>
      
      <div>
        <span>
          <span id="brand-version-text"></span>
          <span id="version-number"></span>
        </span>
      </div>
      
      <div class="spaced">
        <span id="known-brands-list-text"></span>
        <span id="brand-count"></span>
        <span>
          <input type="button" id="abf-known-brand-view-control" class="abf-known-brand-view-control-button btn btn-secondary"/>
        </span>
      </div>
      <div id="abf-dashboard-known-brands"></div>
      
      <div class="spaced">
        <span id="seen-brands-list-text"></span>
        <span id="seen-brand-count"></span>
        <span><input type="button" id="abf-seen-brand-view-control" class="abf-seen-brand-view-control-button btn btn-secondary"/></span>
        <span><input type="button" id="abf-seen-brand-clear" class="abf-seen-brand-view-control-button btn btn-danger"></span>
      </div>
      <div id="abf-dashboard-seen-brands"></div>
      
      <div class="spaced">
        <div id="abf-experimental-features"></div>
        <hr class="spaced"/>
        
        <div class="spaced">
          <div class="double-spaced"></div>
          <input type="checkbox" id="abf-use-filter-with-refiner" option="abf-use-filter-with-refiner" />
          <label for="abf-use-filter-with-refiner" id="abf-use-filter-with-refiner-text"></label>
        </div>
        <div class="spaced">
          <div class="double-spaced"></div>
          <span id="abf-search-depth-text"></span>
          <span>
            <input type="number" id="abf-search-depth" option="abf-search-depth" class="dropdown" />
            <label for="abf-search-depth" id="abf-search-depth"></label>
          </span>
          <span><input type="button" id="abf-save-search-depth-button" class="abf-save-search-depth-button btn btn-primary" value="Save"/></span>
          <span id="abf-search-depth-saved-confirm" class="abf-search-depth-saved-confirm"></span>
        </div>
        
        <hr class="double-spaced"/>
      </div>
      
      <div class="options-links spaced">
        <a href="https://github.com/chris-mosley/AmazonBrandFilter/issues" id="popup-feedback-text"></a>
        <a href="https://github.com/chris-mosley/AmazonBrandFilterList#missing-a-brand" id="popup-missing-brand-text"></a>
        <a href="https://github.com/chris-mosley/AmazonBrandFilter#help-translate" id="popup-help-translate"></a>
      </div>

      <!-- Last Run -->
      <div class="last-run">
        <span id="popup-last-run"></span>
        <span id="last-run"></span>
      </div>
    </div>
    </div>
  </div>
    <script src="gui.js"></script>
  </body>
</html>
